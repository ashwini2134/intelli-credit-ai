<!DOCTYPE html>
<html>
<head>
<title>Risk Result</title>

<style>

body{
font-family:Segoe UI;
background:#f1f5f9;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.card{
background:white;
padding:40px;
width:500px;
border-radius:12px;
box-shadow:0px 10px 30px rgba(0,0,0,0.1);
text-align:center;
}

.score{
font-size:50px;
color:#2563eb;
margin-bottom:10px;
}

pre{
text-align:left;
background:#f8fafc;
padding:20px;
border-radius:8px;
}

button{
margin-top:20px;
padding:12px 30px;
font-size:16px;
background:#3b82f6;
border:none;
border-radius:6px;
color:white;
cursor:pointer;
}

button:hover{
background:#2563eb;
}

</style>
</head>

<body>

<div class="card">

<h1>Risk Assessment Result</h1>

<div class="score">
{{ score }}
</div>

<h3>{{ level }}</h3>

<h2>Credit Appraisal Memo</h2>

<pre>
{{ cam }}
</pre>

<a href="/dashboard">
<button>Analyze Another</button>
</a>

</div>

</body>
</html>
