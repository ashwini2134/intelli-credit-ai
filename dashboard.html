<!DOCTYPE html>
<html>
<head>
<title>IntelliCredit Dashboard</title>

<style>

body{
margin:0;
font-family:Segoe UI;
background:linear-gradient(135deg,#1e3a8a,#0f172a);
height:100vh;
display:flex;
align-items:center;
justify-content:center;
color:white;
}

.container{
background:white;
color:black;
padding:40px;
border-radius:12px;
width:450px;
text-align:center;
box-shadow:0px 10px 30px rgba(0,0,0,0.2);
}

h1{
margin-bottom:20px;
}

.upload-area{
border:2px dashed #3b82f6;
border-radius:10px;
padding:40px;
cursor:pointer;
background:#f8fafc;
}

.upload-area:hover{
background:#e2e8f0;
}

button{
margin-top:20px;
padding:12px 30px;
background:#3b82f6;
border:none;
color:white;
font-size:16px;
border-radius:6px;
cursor:pointer;
}

button:hover{
background:#2563eb;
}

</style>

</head>

<body>

<div class="container">

<h1>Upload Financial Document</h1>

<form action="/analyze" method="post" enctype="multipart/form-data">

<div class="upload-area">

<p>Drag & Drop your document here</p>
<p>or</p>

<input type="file" name="file" required>

</div>

<button type="submit">Analyze Risk</button>

</form>

<br>

<a href="/">Back to Home</a>

</div>

</body>
</html>
